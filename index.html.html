<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothing Brand</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        color: #333;
    }

    header {
        background: #111;
        color: white;
        padding: 20px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        color: #e60023;
        letter-spacing: 2px;
    }

    nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        transition: 0.3s;
    }

    nav a:hover {
        color: #e60023;
    }

    .hero {
        height: 80vh;
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                    url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b');
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        text-align: center;
    }

    .hero h2 {
        font-size: 3rem;
        margin-bottom: 20px;
    }

    /* OBLIQUE BUTTON */
    .btn {
        background: #e60023;
        color: white;
        padding: 15px 30px;
        border: none;
        cursor: pointer;
        font-size: 16px;
        border-radius: 12px;
        transform: skewX(-15deg);
        transition: 0.3s;
    }

    .btn span {
        display: inline-block;
        transform: skewX(15deg);
    }

    .btn:hover {
        background: #ff1a3d;
        transform: skewX(-15deg) scale(1.05);
    }

    .section {
        padding: 60px 50px;
        text-align: center;
    }

    .products {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
    }

    .card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        width: 250px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-10px);
    }

    .card img {
        width: 100%;
        border-radius: 15px;
    }

    .card h3 {
        margin: 15px 0;
    }

    footer {
        background: #111;
        color: white;
        text-align: center;
        padding: 20px;
    }

</style>
</head>

<body>

<header>
    <h1>BRAND</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Style Meets Performance</h2>
    <button class="btn"><span>Shop Now</span></button>
</section>

<section class="section">
    <h2>Featured Products</h2>
    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
            <h3>Red Hoodie</h3>
            <button class="btn"><span>Buy</span></button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
            <h3>Grey Shirt</h3>
            <button class="btn"><span>Buy</span></button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
            <h3>White Sneakers</h3>
            <button class="btn"><span>Buy</span></button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Brand. All rights reserved.</p>
</footer>

</body>
</html>
